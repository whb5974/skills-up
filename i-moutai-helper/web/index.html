<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍶 i 茅台 i 购抢购助手 - 数据看板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
        }
        
        .status-bar {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .status-item {
            text-align: center;
        }
        
        .status-item .icon {
            font-size: 2em;
            margin-bottom: 5px;
        }
        
        .status-item .value {
            font-size: 1.3em;
            font-weight: bold;
            color: #667eea;
        }
        
        .status-item .label {
            color: #666;
            font-size: 0.9em;
        }
        
        .countdown-section {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            color: white;
        }
        
        .countdown-section h2 {
            margin-bottom: 15px;
            text-align: center;
        }
        
        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .countdown-card {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        
        .countdown-card .time {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .countdown-card .product {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .countdown-card .status {
            font-size: 0.8em;
            margin-top: 5px;
            padding: 3px 8px;
            border-radius: 10px;
            display: inline-block;
        }
        
        .countdown-card .status.upcoming {
            background: rgba(255,255,255,0.3);
        }
        
        .countdown-card .status.active {
            background: #10b981;
            animation: pulse 2s infinite;
        }
        
        .countdown-card .status.passed {
            background: rgba(0,0,0,0.2);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-card .icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-card .label {
            color: #666;
            font-size: 1em;
            margin-top: 5px;
        }
        
        .section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .section h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .product-list {
            list-style: none;
        }
        
        .product-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .product-item:last-child {
            border-bottom: none;
        }
        
        .product-info {
            flex: 1;
        }
        
        .product-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .product-details {
            font-size: 0.9em;
            color: #666;
        }
        
        .product-price {
            text-align: right;
        }
        
        .guide-price {
            color: #f59e0b;
            font-weight: bold;
            font-size: 1.2em;
        }
        
        .market-price {
            color: #10b981;
            font-size: 0.9em;
        }
        
        .profit {
            color: #ef4444;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .session-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }
        
        .session-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .session-card .session-time {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .session-card .session-product {
            font-size: 1.1em;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        
        .session-card .session-status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.8em;
            background: rgba(255,255,255,0.2);
        }
        
        .session-card .countdown {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.2em;
            font-weight: bold;
        }
        
        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }
        
        .calendar-header {
            text-align: center;
            font-weight: bold;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
        }
        
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 1.2em;
            position: relative;
        }
        
        .calendar-day.success {
            background: #10b981;
            color: white;
        }
        
        .calendar-day.failed {
            background: #ef4444;
            color: white;
        }
        
        .calendar-day.pending {
            background: #fbbf24;
            color: white;
        }
        
        .calendar-day.empty {
            background: transparent;
        }
        
        .calendar-day.today {
            border: 3px solid #667eea;
        }
        
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            justify-content: center;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 5px;
        }
        
        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            opacity: 0.8;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .status-bar {
                flex-wrap: wrap;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍶 i 茅台 i 购抢购助手</h1>
            <div class="subtitle">🚀 抢购制 · 拼手速 · 准时提交</div>
        </div>
        
        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="status-item">
                <div class="icon">📱</div>
                <div class="value" id="accountPhone">155****6887</div>
                <div class="label">绑定账号</div>
            </div>
            <div class="status-item">
                <div class="icon">🟢</div>
                <div class="value">运行中</div>
                <div class="label">服务状态</div>
            </div>
            <div class="status-item">
                <div class="icon">⏰</div>
                <div class="value" id="nextSession">09:00</div>
                <div class="label">下一场抢购</div>
            </div>
            <div class="status-item">
                <div class="icon">📊</div>
                <div class="value" id="totalSessions">0</div>
                <div class="label">今日抢购次数</div>
            </div>
            <div class="status-item">
                <div class="icon">🎯</div>
                <div class="value" id="successRate">0%</div>
                <div class="label">成功率</div>
            </div>
        </div>
        
        <!-- 倒计时区域 -->
        <div class="countdown-section">
            <h2>⏰ 今日抢购场次倒计时</h2>
            <div class="countdown-grid" id="countdownGrid">
                <!-- 由 JS 生成 -->
            </div>
        </div>
        
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="icon">🛒</div>
                <div class="value" id="totalGrabbed">0</div>
                <div class="label">累计抢购</div>
            </div>
            <div class="stat-card">
                <div class="icon">🎉</div>
                <div class="value" id="totalSuccess">0</div>
                <div class="label">成功次数</div>
            </div>
            <div class="stat-card">
                <div class="icon">💰</div>
                <div class="value" id="totalProfit">0 元</div>
                <div class="label">累计收益</div>
            </div>
            <div class="stat-card">
                <div class="icon">📅</div>
                <div class="value" id="accountCount">1</div>
                <div class="label">账号数量</div>
            </div>
        </div>
        
        <!-- 抢购产品 -->
        <div class="section">
            <h2>📦 抢购产品列表</h2>
            <ul class="product-list" id="productList">
                <!-- 产品列表由 JS 生成 -->
            </ul>
        </div>
        
        <!-- 抢购场次 -->
        <div class="section">
            <h2>🕐 今日抢购场次</h2>
            <div class="session-list" id="sessionList">
                <!-- 场次列表由 JS 生成 -->
            </div>
        </div>
        
        <!-- 申购日历 -->
        <div class="section">
            <h2>📅 抢购日历 - 2026 年 3 月</h2>
            <div class="calendar" id="calendar">
                <div class="calendar-header">一</div>
                <div class="calendar-header">二</div>
                <div class="calendar-header">三</div>
                <div class="calendar-header">四</div>
                <div class="calendar-header">五</div>
                <div class="calendar-header">六</div>
                <div class="calendar-header">日</div>
                <!-- 日历由 JS 生成 -->
            </div>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: #10b981;"></div>
                    <span>抢购成功</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ef4444;"></div>
                    <span>抢购失败</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #fbbf24;"></div>
                    <span>待抢购</span>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>i 茅台 i 购抢购助手 v1.1 | 数据更新于 <span id="updateTime"></span></p>
            <p style="margin-top: 10px; font-size: 0.9em;">⚠️ 抢购制：09:00/12:00/14:00/20:00 准时提交</p>
        </div>
    </div>
    
    <script>
        // 模拟数据 (实际应从 API 获取)
        const data = {
            account: {
                phone: "155****6887",
                status: "运行中",
                nextSession: "09:00",
                totalSessions: 0,
                successRate: "0%"
            },
            sessions: [
                { time: "09:00", product: "飞天 500ml", status: "upcoming", countdown: "--:--:--" },
                { time: "12:00", product: "飞天 375ml×2", status: "upcoming", countdown: "--:--:--" },
                { time: "14:00", product: "茅台 1935", status: "upcoming", countdown: "--:--:--" },
                { time: "20:00", product: "珍品茅台", status: "upcoming", countdown: "--:--:--" }
            ],
            stats: {
                totalGrabbed: 0,
                totalSuccess: 0,
                totalProfit: 0,
                accountCount: 1
            },
            products: [
                {
                    name: "53%vol 500ml 飞天茅台",
                    guidePrice: 1499,
                    marketPrice: "2600-2800",
                    profit: "~1200",
                    difficulty: 5,
                    recommend: true
                },
                {
                    name: "53%vol 375ml×2 飞天茅台",
                    guidePrice: 2999,
                    marketPrice: "4500-4800",
                    profit: "~1600",
                    difficulty: 4,
                    recommend: true
                },
                {
                    name: "53%vol 500ml 茅台 1935",
                    guidePrice: 1188,
                    marketPrice: "1400-1600",
                    profit: "~300",
                    difficulty: 3,
                    recommend: false
                },
                {
                    name: "53%vol 500ml 珍品茅台",
                    guidePrice: 3999,
                    marketPrice: "5500-6000",
                    profit: "~1800",
                    difficulty: 4,
                    recommend: true
                }
            ],
            calendar: {
                year: 2026,
                month: 3,
                reservations: {}
            }
        };
        
        // 更新状态栏
        document.getElementById('accountPhone').textContent = data.account.phone;
        document.getElementById('nextSession').textContent = data.account.nextSession;
        document.getElementById('totalSessions').textContent = data.account.totalSessions;
        document.getElementById('successRate').textContent = data.account.successRate;
        
        // 更新统计
        document.getElementById('totalGrabbed').textContent = data.stats.totalGrabbed;
        document.getElementById('totalSuccess').textContent = data.stats.totalSuccess;
        document.getElementById('totalProfit').textContent = data.stats.totalProfit + '元';
        document.getElementById('accountCount').textContent = data.stats.accountCount;
        
        // 生成倒计时卡片
        function generateCountdown() {
            const grid = document.getElementById('countdownGrid');
            const now = new Date();
            
            data.sessions.forEach(session => {
                const [hours, minutes] = session.time.split(':').map(Number);
                const sessionTime = new Date();
                sessionTime.setHours(hours, minutes, 0, 0);
                
                const diff = sessionTime - now;
                const hoursLeft = Math.floor(diff / (1000 * 60 * 60));
                const minutesLeft = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const secondsLeft = Math.floor((diff % (1000 * 60)) / 1000);
                
                let statusClass = 'upcoming';
                let statusText = '未开始';
                let countdownText = `${hoursLeft.toString().padStart(2, '0')}:${minutesLeft.toString().padStart(2, '0')}:${secondsLeft.toString().padStart(2, '0')}`;
                
                if (diff < 0) {
                    statusClass = 'passed';
                    statusText = '已结束';
                    countdownText = '--:--:--';
                } else if (diff < 600000) { // 10 分钟内
                    statusClass = 'active';
                    statusText = '准备中';
                }
                
                const card = document.createElement('div');
                card.className = 'countdown-card';
                card.innerHTML = `
                    <div class="time">${session.time}</div>
                    <div class="product">${session.product}</div>
                    <div class="status ${statusClass}">${statusText}</div>
                    <div style="margin-top: 10px; font-size: 0.9em;">${countdownText}</div>
                `;
                
                grid.appendChild(card);
            });
        }
        
        // 生成产品列表
        function generateProductList() {
            const list = document.getElementById('productList');
            
            data.products.forEach(product => {
                const item = document.createElement('li');
                item.className = 'product-item';
                
                const stars = '⭐'.repeat(product.difficulty) + '☆'.repeat(5 - product.difficulty);
                const recommendBadge = product.recommend ? '<span style="background: #ef4444; color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.8em; margin-left: 5px;">推荐</span>' : '';
                
                item.innerHTML = `
                    <div class="product-info">
                        <div class="product-name">${product.name} ${recommendBadge}</div>
                        <div class="product-details">抢购难度：${stars}</div>
                    </div>
                    <div class="product-price">
                        <div class="guide-price">¥${product.guidePrice}</div>
                        <div class="market-price">市场价：¥${product.marketPrice}</div>
                        <div class="profit">利润：¥${product.profit}</div>
                    </div>
                `;
                
                list.appendChild(item);
            });
        }
        
        // 生成场次列表
        function generateSessionList() {
            const list = document.getElementById('sessionList');
            
            data.sessions.forEach(session => {
                const card = document.createElement('div');
                card.className = 'session-card';
                
                card.innerHTML = `
                    <div class="session-time">${session.time}</div>
                    <div class="session-product">${session.product}</div>
                    <div class="session-status">${session.status === 'upcoming' ? '未开始' : session.status}</div>
                `;
                
                list.appendChild(card);
            });
        }
        
        // 生成日历
        function generateCalendar() {
            const calendar = document.getElementById('calendar');
            const { year, month, reservations } = data.calendar;
            
            const firstDay = new Date(year, month - 1, 1);
            const startWeekday = firstDay.getDay() || 7;
            const daysInMonth = new Date(year, month, 0).getDate();
            
            for (let i = 1; i < startWeekday; i++) {
                const empty = document.createElement('div');
                empty.className = 'calendar-day empty';
                calendar.appendChild(empty);
            }
            
            const today = new Date();
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const status = reservations[dateStr] || '';
                
                const dayEl = document.createElement('div');
                dayEl.className = `calendar-day ${status} ${day === today.getDate() && month === today.getMonth() + 1 ? 'today' : ''}`;
                dayEl.textContent = day;
                
                calendar.appendChild(dayEl);
            }
        }
        
        // 更新时间
        document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');
        
        // 初始化
        generateCountdown();
        generateProductList();
        generateSessionList();
        generateCalendar();
        
        // 每秒更新倒计时
        setInterval(() => {
            document.getElementById('countdownGrid').innerHTML = '';
            generateCountdown();
            document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');
        }, 1000);
    </script>
</body>
</html>
